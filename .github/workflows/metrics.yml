name: Metrics
on:
  schedule: [{cron: "0 16 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    
      - name: Metrics - General
        uses: lowlighter/metrics@latest
        with:
          filename: .github/stats/general.svg
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: pull-request
          
